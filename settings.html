<div class="quick-char-regex-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Quick Char Regex</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
            <div class="quick-char-regex-select-block flex-container">
                <label for="method-setting">Replacement Method</label>
                <select id="method-setting">
                    <option value="regex">Regex Replace</option>
                    <option value="simple">Simple Replace</option>
                </select>
                <label for="field-setting">Field to Modify</label>
                <select id="field-setting">
                    <option value="description">Description</option>
                    <option value="first_mes">First Message</option>
                    <option value="mes_example">Message Example</option>
                    <option value="scenario">Scenario</option>
                    <option value="personality">Personality</option>
                </select>
            </div>
        </div>
    </div>
</div>
